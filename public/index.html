<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media Enhancer Pro</title>
  <style>
    :root{--bg:#0b1020;--panel:#121a2b;--text:#eef2ff;--muted:#9fb0d9;--accent:#7bb3ff;--accent2:#80f0cf;--border:#26304f}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#08101e,#10182a);color:var(--text);font-family:Inter,Arial,sans-serif}
    .wrap{max-width:1150px;margin:0 auto;padding:24px}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px}
    @media (max-width:960px){.grid{grid-template-columns:1fr}} .card{background:rgba(18,26,43,.94);border:1px solid var(--border);border-radius:20px;padding:18px}
    label{display:block;font-weight:700;margin-bottom:8px} input,select,button{font:inherit}
    input[type="file"],select,input[type="number"]{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:#0d1423;color:var(--text)}
    input[type="range"]{width:100%} .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
    @media (max-width:720px){.row,.row3{grid-template-columns:1fr}} video{width:100%;max-height:430px;border-radius:16px;background:#000}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px} button{border:none;border-radius:14px;padding:12px 16px;font-weight:800;background:var(--accent);color:#08111e;cursor:pointer}
    button.secondary{background:#192544;color:var(--text);border:1px solid var(--border)} button:disabled{opacity:.6;cursor:not-allowed}
    .prog{height:10px;border-radius:999px;overflow:hidden;background:#0a1120;border:1px solid var(--border)} .bar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .25s ease}
    .log{width:100%;min-height:240px;background:#0a1020;border:1px solid var(--border);border-radius:14px;padding:12px;white-space:pre-wrap;color:#dce4ff}
    .small,.help{font-size:12px;color:var(--muted)} .filelink{display:none;margin-top:12px;padding:12px 14px;border:1px solid var(--border);border-radius:14px;background:#101936}
    .filelink a{color:#b9d4ff}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Media Enhancer Pro</h1>
    <p class="help">Railway-ready video enhancer with Docker and system FFmpeg.</p>
    <div class="grid">
      <div class="card">
        <label for="fileInput">Upload video</label>
        <input id="fileInput" type="file" accept="video/*" />
        <div style="margin-top:16px"><video id="preview" controls playsinline></video></div>

        <div class="row" style="margin-top:14px">
          <div><label for="trimStart">Trim start (seconds)</label><input id="trimStart" type="number" min="0" step="0.1" value="0" /></div>
          <div><label for="trimEnd">Trim end (seconds)</label><input id="trimEnd" type="number" min="0" step="0.1" value="0" /></div>
        </div>

        <div class="row3" style="margin-top:14px">
          <div><label for="preset">Enhancement preset</label>
            <select id="preset">
              <option value="balanced">Balanced</option>
              <option value="clarity">Clarity boost</option>
              <option value="social">Social media</option>
              <option value="cinematic">Cinematic clean</option>
            </select>
          </div>
          <div><label for="resolution">Output resolution</label>
            <select id="resolution">
              <option value="720">1280×720</option>
              <option value="1080" selected>1920×1080</option>
              <option value="2160">3840×2160 (4K export)</option>
            </select>
          </div>
          <div><label for="audioPreset">Audio preset</label>
            <select id="audioPreset">
              <option value="voice">Voice clear</option>
              <option value="balanced" selected>Balanced</option>
              <option value="loud">Loud boost</option>
            </select>
          </div>
        </div>

        <div class="row" style="margin-top:14px">
          <div><label for="crf">Video quality (CRF)</label><input id="crf" type="range" min="18" max="32" step="1" value="23" /><div class="small">Current: <span id="crfVal">23</span></div></div>
          <div><label for="audioGain">Audio gain</label><input id="audioGain" type="range" min="0" max="8" step="0.5" value="2" /><div class="small">Current: <span id="audioGainVal">+2 dB</span></div></div>
        </div>

        <div class="actions">
          <button id="processBtn" disabled>Enhance &amp; export MP4</button>
          <button id="resetBtn" class="secondary">Reset</button>
        </div>

        <div id="downloadBox" class="filelink">Ready: <a id="downloadLink" href="#" download>Download processed MP4</a></div>
      </div>

      <div class="card">
        <label>Progress</label>
        <div class="prog"><div id="bar" class="bar"></div></div>
        <div id="status" style="margin:10px 0 14px;font-weight:800">Status: Waiting for video</div>
        <label>Logs</label>
        <div id="log" class="log">Ready.</div>
      </div>
    </div>
  </div>

<script>
const $ = id => document.getElementById(id);
const fileInput = $("fileInput"), preview = $("preview"), processBtn = $("processBtn"), resetBtn = $("resetBtn"),
      statusEl = $("status"), bar = $("bar"), logEl = $("log"), downloadBox = $("downloadBox"), downloadLink = $("downloadLink"),
      crf = $("crf"), crfVal = $("crfVal"), audioGain = $("audioGain"), audioGainVal = $("audioGainVal");
let currentFile = null, previewURL = null, lastDownloadURL = null, animTimer = null;
crf.addEventListener("input",()=>crfVal.textContent=crf.value);
audioGain.addEventListener("input",()=>audioGainVal.textContent=`+${audioGain.value} dB`);
function log(msg){logEl.textContent += "\n"+msg; logEl.scrollTop = logEl.scrollHeight;}
function clearLog(){logEl.textContent="Ready."}
function setStatus(msg){statusEl.textContent="Status: "+msg}
function setProgress(p){bar.style.width=Math.max(0,Math.min(100,p*100))+"%"}
function stopAnim(){if(animTimer){clearInterval(animTimer);animTimer=null}}
fileInput.addEventListener("change",()=>{
  currentFile = fileInput.files?.[0] || null;
  downloadBox.style.display = "none";
  if (lastDownloadURL) { URL.revokeObjectURL(lastDownloadURL); lastDownloadURL = null; }
  if (previewURL) URL.revokeObjectURL(previewURL);
  if (!currentFile) { processBtn.disabled = true; setStatus("Waiting for video"); return; }
  previewURL = URL.createObjectURL(currentFile); preview.src = previewURL; preview.load();
  processBtn.disabled = false; clearLog(); log(`Loaded file: ${currentFile.name}`); log(`Size: ${(currentFile.size/1024/1024).toFixed(2)} MB`);
  setStatus("Video loaded"); setProgress(0);
});
resetBtn.addEventListener("click",()=>{
  stopAnim(); currentFile = null; fileInput.value = "";
  if (previewURL) URL.revokeObjectURL(previewURL); previewURL = null;
  if (lastDownloadURL) URL.revokeObjectURL(lastDownloadURL); lastDownloadURL = null;
  preview.removeAttribute("src"); preview.load(); downloadBox.style.display="none"; processBtn.disabled = true;
  clearLog(); setStatus("Waiting for video"); setProgress(0);
  $("trimStart").value=0; $("trimEnd").value=0; $("preset").value="balanced"; $("resolution").value="1080"; $("audioPreset").value="balanced";
  $("crf").value=23; $("audioGain").value=2; crfVal.textContent="23"; audioGainVal.textContent="+2 dB";
});

processBtn.addEventListener("click", async ()=>{
  if (!currentFile) return;
  try{
    processBtn.disabled = true; downloadBox.style.display="none";
    clearLog(); setStatus("Uploading & processing"); setProgress(0.08); log("Preparing upload...");
    let pulse=0.08; animTimer = setInterval(()=>{ pulse+=0.02; if(pulse>0.92) pulse=0.18; setProgress(pulse); }, 800);

    const fd = new FormData();
    fd.append("media", currentFile);
    fd.append("trimStart", $("trimStart").value || "0");
    fd.append("trimEnd", $("trimEnd").value || "0");
    fd.append("preset", $("preset").value);
    fd.append("resolution", $("resolution").value);
    fd.append("audioPreset", $("audioPreset").value);
    fd.append("crf", $("crf").value);
    fd.append("audioGain", $("audioGain").value);

    const response = await fetch("/api/enhance", { method: "POST", body: fd });
    log(`Server responded with status ${response.status}.`);

    if (!response.ok) {
      const contentType = response.headers.get("content-type") || "";
      let errText = "Processing failed.";
      if (contentType.includes("application/json")) {
        const errJson = await response.json();
        errText = errJson.error || errText;
        if (errJson.details) errText += "\nDetails: " + errJson.details;
        if (errJson.stderr) errText += "\nFFmpeg: " + errJson.stderr;
      } else {
        const raw = await response.text();
        errText = raw || errText;
      }
      throw new Error(errText);
    }

    const blob = await response.blob();
    if (!blob.size) throw new Error("Processed file is empty.");
    stopAnim(); setProgress(1);
    lastDownloadURL = URL.createObjectURL(blob);
    downloadLink.href = lastDownloadURL;
    const stem = (currentFile.name || "processed").replace(/\.[^.]+$/, "");
    downloadLink.download = stem + "-enhanced.mp4";
    downloadBox.style.display = "block";
    setStatus("Processing complete");
    log(`Done. Output size: ${(blob.size/1024/1024).toFixed(2)} MB`);
  } catch (err) {
    stopAnim(); setStatus("Failed"); setProgress(0); log("Error: " + (err.message || err));
  } finally {
    processBtn.disabled = false;
  }
});
</script>
</body>
</html>
