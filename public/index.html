<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Media Enhancer Pro</title>
<link rel="manifest" href="/manifest.json"/>
<style>
body{font-family:Arial;background:#0b1020;color:#fff;margin:0;padding:20px}
.card{background:#121a2b;padding:20px;border-radius:12px;margin-bottom:15px}
button{padding:10px;border-radius:8px;background:#4da3ff;border:none}
.hidden{display:none}
</style>
</head>
<body>
<h2>Media Enhancer Pro 🚀</h2>

<div class="card">
<button onclick="setMode('fast')">Fast</button>
<button onclick="setMode('ai')">AI</button>

<input type="file" id="file"/>

<div id="ai" class="hidden">
<input id="eleven" placeholder="ElevenLabs Key"/>
<input id="fal" placeholder="fal Key"/>
</div>

<button onclick="process()">Enhance</button>
<video id="v" controls></video>
<a id="dl" download style="display:none">Download</a>
</div>

<script>
let mode="fast"
function setMode(m){
 mode=m
 document.getElementById("ai").classList.toggle("hidden", m!=="ai")
}

document.getElementById("file").onchange=e=>{
 document.getElementById("v").src=URL.createObjectURL(e.target.files[0])
}

async function process(){
 const f=document.getElementById("file").files[0]
 if(!f) return alert("upload")

 const fd=new FormData()
 fd.append("media",f)
 fd.append("mode",mode)
 fd.append("eleven",document.getElementById("eleven").value)
 fd.append("fal",document.getElementById("fal").value)

 const res=await fetch("/api/enhance",{method:"POST",body:fd})
 if(!res.ok){alert("error");return}

 const blob=await res.blob()
 const url=URL.createObjectURL(blob)
 document.getElementById("dl").href=url
 document.getElementById("dl").style.display="block"
}
</script>
</body>
</html>
